{% extends 'base.html' %}
{% block content %}

<style>
.forgot-section {
    min-height: 84vh;
    background: var(--white, #faf9f7);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 16px;
}

.forgot-card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,.07);
    padding: 44px 40px;
    animation: forgotFade .5s ease forwards;
}
@keyframes forgotFade {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
}

.forgot-brand {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--charcoal, #1a1a1a);
    margin-bottom: 6px;
}
.forgot-brand span { color: var(--gold, #bfa26a); }

.forgot-subtitle {
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: .75rem;
    color: var(--muted, #aaa);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 10px;
}

.forgot-desc {
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    color: #999;
    line-height: 1.7;
    margin-bottom: 28px;
}

.forgot-divider {
    height: 1px;
    background: rgba(0,0,0,.07);
    margin: 24px 0;
}

.forgot-label {
    display: block;
    font-size: .65rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    color: var(--charcoal, #1a1a1a);
    margin-bottom: 7px;
}

.forgot-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid rgba(0,0,0,.12);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    color: var(--charcoal, #1a1a1a);
    background: #fff;
    transition: border-color .2s;
    outline: none;
    margin-bottom: 20px;
    box-sizing: border-box;
}
.forgot-input:focus { border-color: var(--gold, #bfa26a); }
.forgot-input::placeholder { color: #ccc; }

.forgot-btn {
    width: 100%;
    padding: 13px;
    background: var(--charcoal, #1a1a1a);
    color: #fff;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: .76rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    transition: background .25s, transform .15s;
}
.forgot-btn:hover {
    background: var(--gold, #bfa26a);
    color: var(--charcoal, #1a1a1a);
    transform: translateY(-1px);
}
.forgot-btn:active { transform: translateY(0); }

.forgot-footer {
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: .8rem;
    color: var(--muted, #aaa);
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
}
.forgot-footer a {
    color: var(--charcoal, #1a1a1a);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid var(--gold, #bfa26a);
    transition: color .2s;
}
.forgot-footer a:hover { color: var(--gold, #bfa26a); }

@media(max-width: 500px) {
    .forgot-card { padding: 32px 20px; }
}
</style>

<section class="forgot-section">
<div class="forgot-card">

    <!-- Brand -->
    <div class="forgot-brand">Style<span>Nest</span></div>
    <div class="forgot-subtitle">Reset Password</div>
    <p class="forgot-desc">
        Enter your email address and we'll send you a link to reset your password.
    </p>

    {% include 'includes/alerts.html' %}

    <form action="{% url 'forgotPassword' %}" method="POST">
        {% csrf_token %}

        <label class="forgot-label">Email Address</label>
        <input type="email"
               name="email"
               class="forgot-input"
               placeholder="you@example.com"
               required>

        <button type="submit" class="forgot-btn">Send Reset Link</button>

    </form>

    <div class="forgot-divider"></div>

    <div class="forgot-footer">
        <a href="{% url 'login' %}">← Back to Sign In</a>
        <a href="{% url 'register' %}">Create Account</a>
    </div>

</div>
</section>

{% endblock %}
