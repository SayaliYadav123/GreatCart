<script>
  $(document).ready(function(){

    // Click a thumbnail → swap main image with fade + set active state
    $('.pd-thumb').click(function(){
      var newSrc = $(this).find('img').attr('src');

      // Fade out → swap src → fade in
      $('#pd-main-img').fadeTo(150, 0, function(){
        $(this).attr('src', newSrc).fadeTo(300, 1);
      });

      // Update active thumbnail border
      $('.pd-thumb').removeClass('active');
      $(this).addClass('active');
    });

  });
</script>
