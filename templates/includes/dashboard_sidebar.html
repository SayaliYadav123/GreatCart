{% load static %}
<aside class="sn-sidebar">
  <div class="sn-sidebar-profile">
    <div class="sn-avatar-wrap">

        <img src="{{ userprofile.profile_picture.url }}" class="sn-avatar" alt="{{ user.full_name }}">

      <div class="sn-avatar-ring"></div>
    </div>
    <div class="sn-sidebar-name">{{ user.full_name }}</div>
    <div class="sn-sidebar-email">{{ user.email }}</div>
  </div>

  <nav class="sn-sidebar-nav">
    <a href="{% url 'dashboard' %}" class="sn-nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="1" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="8" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
      Overview
    </a>
    <a href="{% url 'my_orders' %}" class="sn-nav-item {% if request.resolver_match.url_name == 'my_orders' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 5h5M4.5 7.5h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      My Orders
    </a>
    <a href="{% url 'edit_profile' %}" class="sn-nav-item {% if request.resolver_match.url_name == 'edit_profile' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M2 12c0-2.21 2.24-4 5-4s5 1.79 5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Edit Profile
    </a>
    <a href="{% url 'change_password' %}" class="sn-nav-item {% if request.resolver_match.url_name == 'change_password' %}active{% endif %}">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="6" width="8" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M5 6V4a2 2 0 014 0v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Change Password
    </a>
    <a href="{% url 'logout' %}" class="sn-nav-item">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 7H2m0 0l2-2M2 7l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M5 4V3a1 1 0 011-1h5a1 1 0 011 1v8a1 1 0 01-1 1H6a1 1 0 01-1-1v-1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Sign Out
    </a>
  </nav>
</aside>
