{% load static %}
<header class="section-header">
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">Style<span>Nest</span></a>

        <button class="navbar-toggler border-0" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto align-items-center gap-4">
                <li class="nav-item"><a class="nav-link active" href="{% url 'home'%}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'shop' %}">Shop</a></li>
                <li class="nav-item">
                    {% if request.user.is_authenticated %}
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle"></i> {{ request.user.first_name|default:request.user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="{% url 'dashboard' %}">
                            <i class="bi bi-grid me-2"></i>Dashboard
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </a></li>
                    </ul>
                    {% else %}
                    <a class="nav-link" href="{% url 'login' %}">
                        <i class="bi bi-person"></i> Login
                    </a>
                    {% endif %}
                </li>

                <li class="nav-item">
                    <a class="nav-link nav-cart" href="{% url 'cart' %}"><i class="bi bi-bag"></i></a>
                </li>
            </ul>
        </div>
    </div>
</nav>


</header> <!-- section-header.// -->
